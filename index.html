<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="description" content="Berita kripto terbaru, harga Bitcoin, Ethereum, dan coin trending setiap hari.">
<meta name="robots" content="index,follow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KriptoKing - Berita Kripto Terbaru</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

header{
    text-align:center;
    padding:20px;
}

.news-card{
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.date{
    color:gray;
    font-size:14px;
}
</style>
</head>
<body>

<header>
    <h1>🚀 KriptoKing</h1>
    <p>Berita Kripto Terbaru dan Analisis Pasar</p>
</header>
<h2>📈 Harga Kripto</h2>

<table border="1" cellpadding="10">
  <thead>
    <tr>
      <th>Koin</th>
      <th>Harga USD</th>
    </tr>
  </thead>

  <tbody id="market-table">
  </tbody>
</table>
    <script>
fetch('data/market.json')
.then(r => r.json())
.then(data => {

  const table = document.getElementById('market-table');

  data.coins.forEach(coin => {

    table.innerHTML += `
      <tr>
        <td>${coin.name}</td>
        <td>$${coin.price}</td>
      </tr>
    `;
  });

});
</script>
    
<div class="news-card">
  <h2>Harga Bitcoin</h2>
  <p id="btc-price">Memuat data...</p>
</div>

<script>
fetch('data/market.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('btc-price').innerHTML =
      `US$ ${data.bitcoin.price}<br>
      Update: ${data.bitcoin.updated}`;
  });
</script>
    <h2>🔥 Trending Coin</h2>

<ul id="trending-list"></ul>

<script>
fetch('data/trending.json')
.then(r => r.json())
.then(data => {

  const list = document.getElementById('trending-list');

  data.coins.forEach(coin => {
    list.innerHTML += `<li>${coin}</li>`;
  });

});
</script>
    
<div id="news-container"></div>

<script>
fetch('data/news.json')
  .then(response => response.json())
  .then(news => {

    const container = document.getElementById('news-container');

    news.forEach(article => {

      container.innerHTML += `
        <div class="news-card">
          <h2>
            <a href="${article.url}">
              ${article.title}
            </a>
          </h2>

          <p class="date">${article.date}</p>

          <p>${article.summary}</p>
        </div>
      `;
    });
  });
</script>

</body>

</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="description" content="Berita kripto terbaru, harga Bitcoin, Ethereum, dan coin trending setiap hari.">
<meta name="robots" content="index,follow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KriptoKing - Berita Kripto Terbaru</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

header{
    text-align:center;
    padding:20px;
}

.news-card{
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.date{
    color:gray;
    font-size:14px;
}
</style>
</head>
<body>

<header>
    <h1>🚀 KriptoKing</h1>
    <p>Berita Kripto Terbaru dan Analisis Pasar</p>
</header>
    <h2>🔥 Trending Coin</h2>

<ul id="trending-list"></ul>

<script>
fetch('data/trending.json')
.then(r => r.json())
.then(data => {

  const list = document.getElementById('trending-list');

  data.coins.forEach(coin => {
    list.innerHTML += `<li>${coin}</li>`;
  });

});
</script>
    
    <h2>📰 Berita Terbaru</h2>
<div id="news-container"></div>

<script>
fetch('data/news.json')
  .then(response => response.json())
  .then(news => {

    const container = document.getElementById('news-container');

  news.slice(0,10).forEach(article => {

      container.innerHTML += `
        <div class="news-card">
          <h2>
            <a href="${article.url}">
              ${article.title}
            </a>
          </h2>

          <p class="date">${article.date}</p>

          <p>${article.summary}</p>
        </div>
      `;
    });
  });
</script>
<div class="news-card">
  <a href="archive.html">
    📚 Lihat Semua Artikel
  </a>
</div>
    <a href="about.html">Tentang Kami</a>
    <hr>

<footer>
  <p>
    © 2026 KriptoKing
  </p>

  <p>
    Berita kripto otomatis, harga Bitcoin dan coin trending.
  </p>
</footer>
</body>

</html>

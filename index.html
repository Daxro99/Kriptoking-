<!DOCTYPE html><html lang="id">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KriptoKing - Berita Kripto Terbaru</title><meta name="description" content="Berita kripto terbaru, harga Bitcoin, Ethereum, dan coin trending setiap hari.">
<meta name="robots" content="index,follow"><style>

body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

header{
    text-align:center;
    padding:20px;
}

.news-card{
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.date{
    color:gray;
    font-size:14px;
}

a{
    text-decoration:none;
}

footer{
    text-align:center;
    margin-top:30px;
    color:#666;
}

</style></head><body><header>
    <h1>🚀 KriptoKing</h1>
    <p>Berita Kripto Terbaru dan Analisis Pasar</p>
</header><div class="news-card">
    <h2>₿ Harga Bitcoin</h2>
    <p id="btc-price">Memuat data...</p>
</div><script>
fetch('./data/market.json')
.then(response => response.json())
.then(data => {

    if(data.bitcoin){

        document.getElementById('btc-price').innerHTML =
        `US$ ${data.bitcoin.price}<br>
        Update: ${data.bitcoin.updated}`;

    } else {

        document.getElementById('btc-price').innerHTML =
        'Data Bitcoin tidak tersedia';

    }

})
.catch(error => {

    document.getElementById('btc-price').innerHTML =
    'Gagal memuat harga Bitcoin';

    console.error(error);

});
</script><div class="news-card">
    <h2>🔥 Trending Coin</h2>
    <ul id="trending-list"></ul>
</div><script>
fetch('./data/trending.json')
.then(response => response.json())
.then(data => {

    const list = document.getElementById('trending-list');

    data.coins.forEach(coin => {

        list.innerHTML += `<li>${coin}</li>`;

    });

})
.catch(error => console.error(error));
</script><h2>📰 Berita Terbaru</h2><div id="news-container"></div><script>
fetch('./data/news.json')
.then(response => response.json())
.then(news => {

    const container =
    document.getElementById('news-container');

    news
    .sort((a,b)=>
      new Date(b.date)-new Date(a.date)
    )
    .slice(0,10)
    .forEach(article => {

        container.innerHTML += `
        <div class="news-card">

            <h2>
                <a href="${article.url}">
                    ${article.title}
                </a>
            </h2>

            <p class="date">
                ${article.date}
            </p>

            <p>
                ${article.summary}
            </p>

        </div>
        `;

    });

})
.catch(error => console.error(error));
</script><div class="news-card">
    <a href="archive.html">
        📚 Lihat Semua Artikel
    </a>
</div><div class="news-card">
    <a href="about.html">
        ℹ️ Tentang Kami
    </a>
</div><footer>
    <hr><p>© 2026 KriptoKing</p>

<p>
Berita kripto otomatis, harga Bitcoin dan coin trending.
</p>

</footer></body>
</html>

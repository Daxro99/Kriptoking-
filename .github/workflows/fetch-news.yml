name: Fetch Crypto News

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/fetchNews.js

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Update news" || exit 0

          git push

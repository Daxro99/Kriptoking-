name: Generate Article

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Article
        run: |

          DATE=$(date +%Y-%m-%d)
          FILE="articles/artikel-$DATE.html"

          cat > $FILE << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Update Pasar Kripto $DATE</title>
          </head>
          <body>

          <h1>Update Pasar Kripto $DATE</h1>

          <p>
          Pasar kripto hari ini menunjukkan aktivitas yang menarik.
          Investor memantau pergerakan Bitcoin, Ethereum, dan beberapa
          aset digital lainnya.
          </p>

          <p>
          Artikel ini dibuat secara otomatis oleh sistem KriptoKing.
          </p>

          <a href="../index.html">Kembali</a>

          </body>
          </html>
          EOF

      - name: Update News JSON
        run: |

          cat > data/news.json << EOF
          [
            {
              "title":"Update Pasar Kripto $(date +%Y-%m-%d)",
              "date":"$(date +%Y-%m-%d)",
              "url":"articles/artikel-$(date +%Y-%m-%d).html",
              "summary":"Ringkasan pasar kripto terbaru."
            }
          ]
          EOF

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "Generate article"

          git push

name: Update Trending

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Trending Data
        run: |
          cat > data/trending.json << EOF
          {
            "updated":"$(date -u +%Y-%m-%d)",
            "coins":[
              "Bitcoin",
              "Ethereum",
              "Solana",
              "XRP",
              "BNB"
            ]
          }
          EOF

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "Update trending"

          git push


<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arsip Artikel - KriptoKing</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:1000px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

.news-card{
  background:white;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<h1>📚 Arsip Artikel</h1>

<p>
<a href="index.html">← Kembali ke Beranda</a>
</p>

<div id="archive"></div>

<script>
fetch('data/news.json')
.then(response => response.json())
.then(news => {

  const container = document.getElementById('archive');

  news.forEach(article => {

    container.innerHTML += `
      <div class="news-card">
        <h2>
          <a href="${article.url}">
            ${article.title}
          </a>
        </h2>

        <p>${article.date}</p>

        <p>${article.summary}</p>
      </div>
    `;

  });

})
.catch(error => {

  document.getElementById('archive').innerHTML =
    "<p>Gagal memuat arsip artikel.</p>";

  console.error(error);

});
</script>

</body>
</html>@
